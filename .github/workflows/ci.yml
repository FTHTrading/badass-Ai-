name: Sovereign AI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML structure
        run: |
          echo "Checking public/index.html exists..."
          test -f public/index.html && echo "✅ index.html found" || exit 1
          echo "Checking app.js exists..."
          test -f public/app.js && echo "✅ app.js found" || exit 1

      - name: Check Worker syntax
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --check worker/index.js && echo "✅ Worker syntax OK"

      - name: Check Apostle Node syntax  
        run: node --check apostle-node/server.js && echo "✅ Apostle Node syntax OK"

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy public --project-name=ai-troptionsmint
